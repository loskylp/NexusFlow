# NexusFlow staging environment — nexusflow.staging.nxlabs.cc
#
# Deploys all core services using pre-built images from the GitHub Container
# Registry (ghcr.io/loskylp/nexusflow). This file is NOT used for local
# development — use the root docker-compose.yml for that.
#
# Prerequisites on the staging host:
#   - External Docker network "traefik" exists (managed by nxlabs.cc Traefik)
#   - External Docker network "postgres" exists (managed by nxlabs.cc PostgreSQL)
#   - PostgreSQL database provisioned: ssh deploy@nxlabs.cc /opt/postgres/provision.sh nexusflow_staging
#   - .env file present in this directory with staging credentials
#
# Deploy:
#   docker compose -f deploy/staging/docker-compose.yml up -d
#
# Image update (auto via nxlabs.cc infrastructure Watchtower, or manual):
#   docker compose -f deploy/staging/docker-compose.yml pull && docker compose -f deploy/staging/docker-compose.yml up -d
#
# Note: NexusFlow does NOT run its own Watchtower. The nxlabs.cc infrastructure
# Watchtower manages container updates across all projects. NexusFlow containers
# opt in via the com.centurylinklabs.watchtower.enable=true label.
#
# See: ADR-005, TASK-029

services:

  api:
    image: ghcr.io/loskylp/nexusflow/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - API_PORT=8080
      - ENV=staging
      - SESSION_TTL_HOURS=${SESSION_TTL_HOURS:-24}
      - HEARTBEAT_INTERVAL_SECONDS=${HEARTBEAT_INTERVAL_SECONDS:-5}
      - HEARTBEAT_TIMEOUT_SECONDS=${HEARTBEAT_TIMEOUT_SECONDS:-15}
      - PENDING_SCAN_INTERVAL_SECONDS=${PENDING_SCAN_INTERVAL_SECONDS:-10}
      - LOG_HOT_RETENTION_HOURS=${LOG_HOT_RETENTION_HOURS:-72}
      - LOG_COLD_RETENTION_HOURS=${LOG_COLD_RETENTION_HOURS:-720}
    networks:
      - traefik
      - postgres
      - internal
    healthcheck:
      # Sends a raw HTTP GET to /api/health and checks for a "status" JSON field.
      # Succeeds on both HTTP 200 (all healthy) and HTTP 503 (degraded but alive).
      test: ["CMD-SHELL", "printf 'GET /api/health HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' | nc -w 3 localhost 8080 | grep -q status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      # --- Traefik routing ---
      # Two routers for the API service:
      #   nexusflow-staging-api     → handles /api/* (REST endpoints)
      #   nexusflow-staging-api-sse → handles /events/* (SSE streaming endpoints)
      #
      # The Go backend registers SSE routes at /events/* (no /api prefix).
      # Both routers use the same backend service (port 8080).
      # Priorities are set explicitly: API=20, SSE=20, Web=10 — both API routers
      # beat the web router; Traefik also prefers longer rules within equal priority.
      - "traefik.enable=true"
      # REST API router — /api/*
      - "traefik.http.routers.nexusflow-staging-api.rule=Host(`nexusflow.staging.nxlabs.cc`) && PathPrefix(`/api`)"
      - "traefik.http.routers.nexusflow-staging-api.tls=true"
      - "traefik.http.routers.nexusflow-staging-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nexusflow-staging-api.entrypoints=websecure"
      - "traefik.http.routers.nexusflow-staging-api.priority=20"
      - "traefik.http.routers.nexusflow-staging-api.service=nexusflow-staging-api"
      # SSE router — /events/* (Server-Sent Events streams, no /api prefix in Go routes)
      - "traefik.http.routers.nexusflow-staging-api-sse.rule=Host(`nexusflow.staging.nxlabs.cc`) && PathPrefix(`/events`)"
      - "traefik.http.routers.nexusflow-staging-api-sse.tls=true"
      - "traefik.http.routers.nexusflow-staging-api-sse.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nexusflow-staging-api-sse.entrypoints=websecure"
      - "traefik.http.routers.nexusflow-staging-api-sse.priority=20"
      - "traefik.http.routers.nexusflow-staging-api-sse.service=nexusflow-staging-api"
      # Shared backend service — both routers resolve to port 8080.
      - "traefik.http.services.nexusflow-staging-api.loadbalancer.server.port=8080"
      # Disable Traefik response buffering for SSE (Server-Sent Events).
      # Traefik buffers backend responses by default. SSE requires events to be flushed to
      # the client immediately as they are written. flushinterval=-1 disables buffering and
      # forwards each write to the client without delay.
      # Note: the Go backend also sets X-Accel-Buffering: no, but that header is nginx-specific
      # and is not honoured by Traefik — this label is the Traefik-side fix. (ADR-007)
      - "traefik.http.services.nexusflow-staging-api.loadbalancer.responseforwarding.flushinterval=-1"
      # --- Watchtower auto-redeploy ---
      # Watchtower polls the registry every 300 s and redeploys when a new image is found.
      - "com.centurylinklabs.watchtower.enable=true"
      # --- Uptime Kuma monitoring via AutoKuma labels ---
      # The api container is the anchor for the NexusFlow Staging group and tag definitions.
      # Group: one collapsible section per system in Uptime Kuma (nxlabs.cc convention).
      - "kuma.nexusflow-staging-group.group.name=NexusFlow Staging"
      # Tags: category labels attached to monitors (nxlabs.cc convention).
      - "kuma.tag-nexusflow-backend.tag.name=Backend"
      - "kuma.tag-nexusflow-backend.tag.color=#FF9800"
      - "kuma.tag-nexusflow-frontend.tag.name=Frontend"
      - "kuma.tag-nexusflow-frontend.tag.color=#9C27B0"
      - "kuma.tag-nexusflow-data.tag.name=Data"
      - "kuma.tag-nexusflow-data.tag.color=#2196F3"
      # Monitor: API health endpoint — nested under the group, tagged Backend.
      - "kuma.nexusflow-staging-api.http.name=NexusFlow Staging API"
      - "kuma.nexusflow-staging-api.http.url=https://nexusflow.staging.nxlabs.cc/api/health"
      - "kuma.nexusflow-staging-api.http.parent_name=nexusflow-staging-group"
      - 'kuma.nexusflow-staging-api.http.tag_names=[{"name": "tag-nexusflow-backend"}]'

  worker:
    image: ghcr.io/loskylp/nexusflow/worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - WORKER_TAGS=${WORKER_TAGS:-demo,etl}
      - ENV=staging
      - HEARTBEAT_INTERVAL_SECONDS=${HEARTBEAT_INTERVAL_SECONDS:-5}
      - HEARTBEAT_TIMEOUT_SECONDS=${HEARTBEAT_TIMEOUT_SECONDS:-15}
    networks:
      - postgres
      - internal
    labels:
      # Watchtower monitors and redeploys this service when a new image is pushed.
      - "com.centurylinklabs.watchtower.enable=true"

  monitor:
    image: ghcr.io/loskylp/nexusflow/monitor:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - ENV=staging
      - HEARTBEAT_TIMEOUT_SECONDS=${HEARTBEAT_TIMEOUT_SECONDS:-15}
      - PENDING_SCAN_INTERVAL_SECONDS=${PENDING_SCAN_INTERVAL_SECONDS:-10}
    networks:
      - postgres
      - internal
    labels:
      # Watchtower monitors and redeploys this service when a new image is pushed.
      - "com.centurylinklabs.watchtower.enable=true"

  web:
    image: ghcr.io/loskylp/nexusflow/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    networks:
      - traefik
    labels:
      # --- Traefik routing ---
      # Routes all non-/api traffic to the React frontend served by nginx.
      # Priority 10 — lower than the API router (20) so /api/* routes always take precedence.
      - "traefik.enable=true"
      - "traefik.http.routers.nexusflow-staging-web.rule=Host(`nexusflow.staging.nxlabs.cc`)"
      - "traefik.http.routers.nexusflow-staging-web.tls=true"
      - "traefik.http.routers.nexusflow-staging-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nexusflow-staging-web.entrypoints=websecure"
      - "traefik.http.routers.nexusflow-staging-web.priority=10"
      - "traefik.http.services.nexusflow-staging-web.loadbalancer.server.port=80"
      # --- Watchtower auto-redeploy ---
      - "com.centurylinklabs.watchtower.enable=true"
      # --- Uptime Kuma monitoring ---
      # Monitor: web frontend — nested under the same group as the API, tagged Frontend.
      - "kuma.nexusflow-staging-web.http.name=NexusFlow Staging Web"
      - "kuma.nexusflow-staging-web.http.url=https://nexusflow.staging.nxlabs.cc/"
      - "kuma.nexusflow-staging-web.http.parent_name=nexusflow-staging-group"
      - 'kuma.nexusflow-staging-web.http.tag_names=[{"name": "tag-nexusflow-frontend"}]'

  redis:
    # Service-managed Redis — not shared infrastructure on nxlabs.cc (ADR-005).
    # AOF + RDB hybrid persistence ensures data survives container restarts (ADR-001, FF-024).
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis-data:/data
    networks:
      - internal
      - postgres  # Also on postgres network so Uptime Kuma can reach Redis for monitoring
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      # --- Watchtower auto-redeploy ---
      # Redis is a project-managed service (installed by NexusFlow, not shared infra).
      # Watchtower keeps it updated when new redis:7-alpine images are published.
      - "com.centurylinklabs.watchtower.enable=true"
      # --- Uptime Kuma monitoring via AutoKuma labels ---
      # Redis monitor — uses Uptime Kuma's native redis monitor type which connects
      # and issues a PING command, verifying the Redis instance is responsive.
      - "kuma.nexusflow-staging-redis.redis.name=NexusFlow Staging Redis"
      - "kuma.nexusflow-staging-redis.redis.database_connection_string=redis://nexusflow-staging-redis-1:6379"
      - "kuma.nexusflow-staging-redis.redis.parent_name=nexusflow-staging-group"
      - 'kuma.nexusflow-staging-redis.redis.tag_names=[{"name": "tag-nexusflow-data"}]'

volumes:
  # Persists Redis data across container restarts (ADR-001, FF-024).
  redis-data:

networks:
  # External network managed by nxlabs.cc Traefik — provides HTTPS ingress.
  traefik:
    external: true
  # External network managed by nxlabs.cc PostgreSQL — provides DB connectivity.
  postgres:
    external: true
  # Internal network for service-to-service communication; not exposed externally.
  internal:
    driver: bridge
