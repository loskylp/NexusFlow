# nginx configuration for serving the NexusFlow React SPA.
# All non-asset paths serve index.html (client-side routing).
# /api and /events are NOT handled here — Traefik routes those to the Go API server.
# See: ADR-005, TASK-001

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unmatched paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache index.html (React app entry point)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
