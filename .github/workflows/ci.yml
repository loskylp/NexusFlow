# NexusFlow CI pipeline.
# Triggers on every push to main and on all pull requests.
# See: ADR-005, TASK-001

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-build-and-test:
    name: Go Build, Vet, and Test
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: nexusflow_test
          POSTGRES_USER: nexusflow
          POSTGRES_PASSWORD: nexusflow_test
        options: >-
          --health-cmd "pg_isready -U nexusflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      DATABASE_URL: postgresql://nexusflow:nexusflow_test@localhost:5432/nexusflow_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies and generate go.sum
        run: go mod download

      - name: Verify module graph
        run: go mod verify

      - name: Build all Go packages
        run: go build ./...

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run tests
        run: go test ./... -v -count=1 -timeout 120s

  frontend-build:
    name: Frontend Build and Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm --prefix web ci

      - name: TypeScript typecheck
        run: npm --prefix web run typecheck

      - name: Build frontend
        run: npm --prefix web run build

  fitness-functions:
    # TASK-038: Fitness function CI gate.
    # Runs non-Docker fitness function tests (FF-013, FF-015, FF-017, FF-019, FF-020).
    # Docker-dependent tests (FF-001, FF-007, FF-008, FF-024) require a separate
    # ops-fitness job with Docker socket access and are tagged with t.Skip.
    # See: TASK-038, process/architect/fitness-functions.md
    name: Fitness Function Tests
    runs-on: ubuntu-latest
    needs: [go-build-and-test]

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: nexusflow_test
          POSTGRES_USER: nexusflow
          POSTGRES_PASSWORD: nexusflow_test
        options: >-
          --health-cmd "pg_isready -U nexusflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    env:
      DATABASE_URL: postgresql://nexusflow:nexusflow_test@localhost:5432/nexusflow_test
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build fitness function test binary
        run: go test -tags integration -c -o /tmp/fitness-test ./tests/system/

      - name: Run fitness function tests (non-Docker)
        # Runs FF-002 (queuing latency), FF-003 (queue backlog via XPENDING),
        # FF-005 (chain dedup), FF-006 (sink atomicity), FF-013 (auth enforcement),
        # FF-015 (compile-time safety), FF-017 (schema migration — requires Postgres),
        # FF-019 (schema validation), FF-020 (skips — requires docker compose),
        # FF-022 (sink inspector). All require Redis; FF-017 also requires Postgres.
        # Docker-dependent tests (FF-001, FF-007, FF-008, FF-024) and infra/load tests
        # (FF-009 through FF-012, FF-014, FF-016, FF-018, FF-021, FF-023, FF-025)
        # are skipped via t.Skip and do not fail the build. See: TASK-038, fitness-functions.md
        run: /tmp/fitness-test -test.v -test.run "TestFF002|TestFF003|TestFF005|TestFF006|TestFF013|TestFF015|TestFF017|TestFF019|TestFF020|TestFF022"

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs: [go-build-and-test, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t nexusflow/api:ci .

      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t nexusflow/worker:ci .

      - name: Build Monitor image
        run: docker build -f Dockerfile.monitor -t nexusflow/monitor:ci .

      - name: Build Web image
        run: docker build -f Dockerfile.web -t nexusflow/web:ci .
